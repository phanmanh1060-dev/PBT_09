<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App - Vanilla JS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="todo-container">
        <header>
            <h1>Todos</h1>
        </header>
        
        <main>
            <form id="todoForm">
                <input id="todoInput" type="text" placeholder="What needs to be done?" autofocus autocomplete="off">
                <button type="submit" id="addBtn">Add</button>
            </form>

            <ul id="todoList"></ul>

            <footer class="todo-footer" id="todoFooter">
                <span id="todoCount">0 items left</span>
                
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>

                <button id="clearCompletedBtn" class="clear-completed">Clear completed</button>
            </footer>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
